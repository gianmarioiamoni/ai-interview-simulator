name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (mypy)
        run: mypy app/ services/ domain/ infrastructure/ || true
        continue-on-error: true

      - name: Test (pytest)
        run: pytest --tb=short

      - name: Readiness deploy gate (local smoke)
        env:
          OPENAI_API_KEY: sk-ci-sentinel
        run: python scripts/ci/run_local_readiness_gate_smoke.py
